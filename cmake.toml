[project]
name = "wiretap_rs"
languages = ["C", "CXX"]

[target.wiretap_rs]
type = "interface"
include-directories = ["include"]

cmake-after = """
find_program(CARGO_EXECUTABLE cargo REQUIRED)

set(CARGO_TARGET_DIR \"${CMAKE_BINARY_DIR}/cargo\")

if(NOT CARGO_BUILD_TARGET AND CMAKE_C_COMPILER_TARGET)
  set(CARGO_BUILD_TARGET \"${CMAKE_C_COMPILER_TARGET}\")
endif()

set(CARGO_BUILD_TARGET \"${CARGO_BUILD_TARGET}\" CACHE STRING \"Rust target triple (e.g. x86_64-pc-windows-msvc). Defaults to CMAKE_C_COMPILER_TARGET if set.\")

if(CARGO_BUILD_TARGET)
  set(CARGO_TARGET_SUBDIR \"${CARGO_BUILD_TARGET}/\")
else()
  set(CARGO_TARGET_SUBDIR \"\")
endif()

if(CMAKE_BUILD_TYPE STREQUAL \"Debug\")
  set(RUST_PROFILE \"debug\")
  set(RUST_BUILD_ARGS build --lib --target-dir \"${CARGO_TARGET_DIR}\")
else()
  set(RUST_PROFILE \"release\")
  set(RUST_BUILD_ARGS build --release --lib --target-dir \"${CARGO_TARGET_DIR}\")
endif()

set(RUST_LIB \"${CARGO_TARGET_DIR}/${CARGO_TARGET_SUBDIR}${RUST_PROFILE}/${CMAKE_STATIC_LIBRARY_PREFIX}wiretap_rs${CMAKE_STATIC_LIBRARY_SUFFIX}\")

set(CARGO_BUILD_ARGS ${RUST_BUILD_ARGS})
if(CARGO_BUILD_TARGET)
  list(APPEND CARGO_BUILD_ARGS --target \"${CARGO_BUILD_TARGET}\")
endif()

add_custom_command(
  OUTPUT \"${RUST_LIB}\"
  COMMAND \"${CARGO_EXECUTABLE}\" ${CARGO_BUILD_ARGS}
  WORKING_DIRECTORY \"${CMAKE_CURRENT_SOURCE_DIR}\"
  COMMENT \"Building Rust static library\"
  VERBATIM
)

add_custom_target(wiretap_rs_build ALL DEPENDS \"${RUST_LIB}\")

add_library(wiretap_rs_static STATIC IMPORTED GLOBAL)
set_target_properties(wiretap_rs_static PROPERTIES IMPORTED_LOCATION \"${RUST_LIB}\")
add_dependencies(wiretap_rs_static wiretap_rs_build)

target_link_libraries(wiretap_rs INTERFACE wiretap_rs_static)
add_library(wiretap_rs::wiretap_rs ALIAS wiretap_rs)
"""
